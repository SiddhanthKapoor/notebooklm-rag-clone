<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google NotebookLM Clone - RAG App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>NotebookLM Clone</h1>
            <p>Upload a document and start chatting with it!</p>
        </header>

        <main>
            <section class="upload-section card">
                <h2>1. Upload Document</h2>
                <form id="uploadForm">
                    <div class="file-input-wrapper">
                        <input type="file" id="document" accept=".pdf,.txt" required>
                        <label for="document" class="file-label">Choose a PDF or TXT file</label>
                    </div>
                    <button type="submit" id="uploadBtn" class="btn primary-btn">Process Document</button>
                </form>
                <div id="uploadStatus" class="status-msg hidden"></div>
            </section>

            <section class="chat-section card disabled" id="chatSection">
                <h2>2. Chat with Document</h2>
                <div class="chat-container" id="chatContainer">
                    <div class="message system-msg">
                        <p>Upload a document to start a conversation!</p>
                    </div>
                </div>
                
                <form id="chatForm">
                    <div class="input-group">
                        <input type="text" id="question" placeholder="Ask a question about your document..." required autocomplete="off">
                        <button type="submit" id="sendBtn" class="btn secondary-btn" disabled>Send</button>
                    </div>
                </form>
            </section>
        </main>
        
        <footer>
            <p>Built with ❤️ for GenAI Assignment by Siddhanth Kapoor (10154)</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
